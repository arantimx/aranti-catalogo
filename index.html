<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catálogo Arānti — Primavera 26'</title>
<meta name="description" content="Productos extraordinarios para tu mesa. Vajillas, cristalería, cubiertos y complementos.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f7f3ee;
  --cream-dark:#ede7dc;
  --teal:#0d3d4a;
  --teal-light:#1a5568;
  --copper:#b8935a;
  --copper-light:#d4aa78;
  --text:#2c2420;
  --muted:#8a7f75;
  --wa:#25d366;
}
html,body{height:100%;background:var(--cream);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden}

header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--cream);border-bottom:1px solid var(--cream-dark);
  height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;
}
.logo-wrap{display:flex;align-items:center;gap:14px;text-decoration:none}
.logo-icon{width:34px;height:34px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;gap:1px}
.logo-name{font-family:'Jost',sans-serif;font-weight:200;font-size:17px;letter-spacing:.35em;color:var(--teal);text-transform:uppercase}
.logo-season{font-size:9px;font-weight:300;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-wa{
  display:flex;align-items:center;gap:7px;background:var(--wa);color:white;
  padding:9px 18px;border-radius:2px;font-size:12px;font-weight:300;letter-spacing:.08em;
  text-decoration:none;transition:opacity .15s;white-space:nowrap;font-family:'Jost',sans-serif;
}
.btn-wa:hover{opacity:.88}
.btn-wa svg{width:15px;height:15px;fill:white;flex-shrink:0}
.btn-dl{
  display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--cream-dark);
  padding:8px 14px;border-radius:2px;font-size:12px;color:var(--muted);cursor:pointer;
  text-decoration:none;transition:all .15s;font-family:'Jost',sans-serif;font-weight:300;letter-spacing:.05em;
}
.btn-dl:hover{border-color:var(--copper);color:var(--copper)}

.sections-nav{
  margin-top:64px;background:var(--teal);
  display:flex;overflow-x:auto;padding:0 32px;
  scrollbar-width:none;border-bottom:1px solid var(--teal-light);
}
.sections-nav::-webkit-scrollbar{display:none}
.snav-btn{
  padding:14px 20px;font-family:'Jost',sans-serif;font-size:11px;font-weight:300;
  letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px;
}
.snav-btn:hover{color:rgba(255,255,255,.85)}
.snav-btn.active{color:var(--copper-light);border-bottom-color:var(--copper-light)}

.viewer-area{
  background:var(--cream-dark);
  min-height:calc(100vh - 64px - 48px);
  display:flex;flex-direction:column;align-items:center;
  padding:32px 20px 100px;position:relative;
  overflow:hidden;
}

#page-container{width:100%;max-width:800px;position:relative;min-height:300px}

.page-wrap{
  background:white;
  box-shadow:0 8px 40px rgba(44,36,32,.15);
  width:100%;
}
.page-wrap canvas{display:block;width:100%;height:auto}

.page-wrap.slide-out-left{animation:slideOutLeft .28s ease-in forwards}
.page-wrap.slide-out-right{animation:slideOutRight .28s ease-in forwards}
.page-wrap.slide-in-right{animation:slideInRight .3s ease-out forwards}
.page-wrap.slide-in-left{animation:slideInLeft .3s ease-out forwards}

@keyframes slideOutLeft{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-60px);opacity:0}}
@keyframes slideOutRight{0%{transform:translateX(0);opacity:1}100%{transform:translateX(60px);opacity:0}}
@keyframes slideInRight{0%{transform:translateX(60px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{0%{transform:translateX(-60px);opacity:0}100%{transform:translateX(0);opacity:1}}

.pdf-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;padding:100px 20px;color:var(--muted);font-size:12px;letter-spacing:.1em;
}
.pdf-spinner{
  width:28px;height:28px;border:1.5px solid var(--cream-dark);
  border-top-color:var(--copper);border-radius:50%;animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.touch-hint{
  margin-top:16px;font-size:11px;letter-spacing:.1em;color:var(--muted);
  display:none;text-align:center;
}

.pdf-controls{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--teal);border-radius:2px;padding:10px 24px;
  display:flex;align-items:center;gap:20px;
  box-shadow:0 4px 24px rgba(13,61,74,.3);z-index:50;white-space:nowrap;
}
.ctrl-btn{
  background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;
  padding:4px 8px;font-size:16px;transition:color .15s;display:flex;align-items:center;
}
.ctrl-btn:hover{color:var(--copper-light)}
.ctrl-btn:disabled{opacity:.2;cursor:default}
.page-info{
  font-family:'Jost',sans-serif;font-size:11px;font-weight:300;letter-spacing:.1em;
  color:rgba(255,255,255,.5);min-width:70px;text-align:center;
}
.ctrl-sep{width:1px;height:16px;background:rgba(255,255,255,.15)}

.wa-float{
  position:fixed;bottom:100px;right:28px;background:var(--wa);color:white;
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(37,211,102,.35);text-decoration:none;z-index:60;
  transition:transform .15s;
}
.wa-float:hover{transform:scale(1.08)}
.wa-float svg{width:22px;height:22px;fill:white}

footer{
  background:var(--teal);padding:28px 32px;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:16px;margin-bottom:60px;
}
.footer-logo{font-family:'Jost',sans-serif;font-weight:200;font-size:16px;letter-spacing:.35em;color:rgba(255,255,255,.7);text-transform:uppercase}
.footer-links{display:flex;gap:20px;font-size:11px;font-weight:300;letter-spacing:.08em;color:rgba(255,255,255,.4)}
.footer-links a{color:rgba(255,255,255,.4);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--copper-light)}

@media(max-width:768px){
  header{padding:0 16px;height:56px}
  .logo-name{font-size:15px;letter-spacing:.25em}
  .sections-nav{padding:0 12px;margin-top:56px}
  .snav-btn{padding:12px 14px;font-size:10px;letter-spacing:.1em}
  .viewer-area{padding:16px 8px 100px}
  .pdf-controls{bottom:20px;padding:9px 16px;gap:14px}
  .wa-float{bottom:90px;right:16px}
  footer{padding:20px 16px}
  .btn-wa span{display:none}
  .btn-wa{padding:9px 12px}
  .touch-hint{display:block}
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc=null,currentPage=1,totalPages=0,rendering=false,scale=1.4;
let touchStartX=0,touchStartY=0,touchLocked=false;
const SECTION_PAGES=[1,3,55,81,90,98,109];

const container=document.getElementById('page-container');
const loading=document.getElementById('loading');
const controls=document.getElementById('pdf-controls');
const pageInfo=document.getElementById('page-info');

function calcScale(){
  const maxW=Math.min(window.innerWidth-40,800);
  scale=maxW/595;
}

async function loadPDF(){
  try{
    calcScale();
    const task=pdfjsLib.getDocument('catalogo.pdf');
    pdfDoc=await task.promise;
    totalPages=pdfDoc.numPages;
    loading.style.display='none';
    controls.style.display='flex';
    await renderPage(1,null);
    setupSwipe();
  }catch(e){
    loading.innerHTML='<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8a7f75" stroke-width="1"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span style="letter-spacing:.08em;font-size:12px">Catálogo no disponible</span><a href="https://wa.me/525624845101" style="color:#b8935a;font-size:11px;letter-spacing:.1em;text-decoration:none">Contactar por WhatsApp</a>';
  }
}

async function renderPage(num,direction){
  if(rendering||!pdfDoc)return;
  rendering=true;
  currentPage=Math.max(1,Math.min(num,totalPages));

  const page=await pdfDoc.getPage(currentPage);
  const viewport=page.getViewport({scale});
  const wrap=document.createElement('div');
  wrap.className='page-wrap';
  const canvas=document.createElement('canvas');
  canvas.width=viewport.width;
  canvas.height=viewport.height;
  wrap.appendChild(canvas);
  await page.render({canvasContext:canvas.getContext('2d'),viewport}).promise;

  const old=container.querySelector('.page-wrap');
  if(old&&direction){
    old.classList.add(direction==='next'?'slide-out-left':'slide-out-right');
    wrap.classList.add(direction==='next'?'slide-in-right':'slide-in-left');
    setTimeout(()=>old.remove(),280);
  } else if(old){
    old.remove();
  }
  container.appendChild(wrap);
  updateControls();
  updateSectionNav();
  rendering=false;
}

function navigate(dir){
  if(dir>0&&currentPage<totalPages) renderPage(currentPage+1,'next');
  if(dir<0&&currentPage>1) renderPage(currentPage-1,'prev');
}

function goToPage(n){
  const dir=n>currentPage?'next':'prev';
  renderPage(n,n!==currentPage?dir:null);
  window.scrollTo({top:0,behavior:'smooth'});
}

function sectionNav(btn){
  document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  goToPage(parseInt(btn.dataset.page));
}

function updateControls(){
  pageInfo.textContent=currentPage+' / '+totalPages;
  document.getElementById('btn-prev').disabled=currentPage<=1;
  document.getElementById('btn-first').disabled=currentPage<=1;
  document.getElementById('btn-next').disabled=currentPage>=totalPages;
  document.getElementById('btn-last').disabled=currentPage>=totalPages;
}

function updateSectionNav(){
  let active=0;
  for(let i=0;i<SECTION_PAGES.length;i++){if(currentPage>=SECTION_PAGES[i])active=i;}
  document.querySelectorAll('.snav-btn').forEach((b,i)=>b.classList.toggle('active',i===active));
}

function setupSwipe(){
  const area=document.getElementById('viewer-area');
  area.addEventListener('touchstart',e=>{
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
    touchLocked=false;
  },{passive:true});
  area.addEventListener('touchmove',e=>{
    if(touchLocked)return;
    const dx=e.touches[0].clientX-touchStartX;
    const dy=e.touches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy))touchLocked=true;
  },{passive:true});
  area.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-touchStartX;
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      dx<0?navigate(1):navigate(-1);
    }
  },{passive:true});
}

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')navigate(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')navigate(-1);
});

window.addEventListener('resize',()=>{calcScale();if(pdfDoc)renderPage(currentPage,null);});

loadPDF();
</script>
